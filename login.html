<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - RAG Console</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

<script>
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: { primary: "#ff2e62", "matte-black": "#0A0A0A", charcoal: "#111111" },
            fontFamily: { display: ["Space Grotesk", "sans-serif"] }
        }
    }
}
</script>

<style>
body { background: #000; color: #f1f5f9; font-family: 'Space Grotesk', sans-serif; }
.neon-border { border: 1px solid rgba(255,46,98,0.3); box-shadow: 0 0 15px rgba(255,46,98,0.1); }
.spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: #ff2e62;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body class="h-screen flex items-center justify-center bg-black">
<div class="w-full max-w-md p-8">
    <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-2 mb-4">
            <div class="w-3 h-3 bg-primary rounded-full animate-pulse"></div>
            <h1 class="text-2xl font-bold tracking-tighter uppercase">RAG<span class="text-primary font-black">CORE</span></h1>
        </div>
        <p class="text-slate-500 text-sm">Enter your credentials to continue</p>
    </div>

    <form id="loginForm" class="bg-matte-black neon-border rounded-2xl p-8 space-y-6">
        <div id="errorMsg" class="hidden bg-red-500/20 border border-red-500/50 text-red-400 text-sm p-3 rounded-lg"></div>
        
        <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Username</label>
            <input 
                type="text" 
                id="username" 
                required
                class="w-full bg-charcoal border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                placeholder="Enter username"
                autocomplete="username"
            />
        </div>

        <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Password</label>
            <input 
                type="password" 
                id="password" 
                required
                class="w-full bg-charcoal border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                placeholder="Enter password"
                autocomplete="current-password"
            />
        </div>

        <button 
            type="submit" 
            id="loginBtn"
            class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:scale-105 transition-all flex items-center justify-center gap-2"
        >
            <span id="loginText">Login</span>
            <div id="loginSpinner" class="spinner hidden"></div>
        </button>
    </form>

    <div class="mt-6 text-center space-y-2">
        <p class="text-[10px] text-slate-600">Don't have an account? <a href="/register" class="text-primary hover:underline">Create one</a></p>
        <p class="text-[10px] text-slate-600">Default: admin / admin123</p>
        <a href="/" class="inline-flex items-center gap-2 text-[10px] text-slate-500 hover:text-primary transition-colors mt-4">
            <span class="material-symbols-outlined text-sm">arrow_back</span>
            Back to Home
        </a>
    </div>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";

document.getElementById("loginForm").onsubmit = async (e) => {
    e.preventDefault();
    
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMsg");
    const loginBtn = document.getElementById("loginBtn");
    const loginText = document.getElementById("loginText");
    const loginSpinner = document.getElementById("loginSpinner");
    
    errorMsg.classList.add("hidden");
    loginBtn.disabled = true;
    loginText.classList.add("hidden");
    loginSpinner.classList.remove("hidden");
    
    try {
        const res = await fetch(`${API_BASE}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ username, password })
        });
        
        // Parse response
        let data;
        try {
            const text = await res.text();
            console.log("Response text:", text); // Debug log
            if (!text) {
                throw new Error("Empty response from server");
            }
            data = JSON.parse(text);
        } catch (parseError) {
            console.error("JSON parse error:", parseError);
            errorMsg.textContent = `Server error: ${res.status} - Invalid response format`;
            errorMsg.classList.remove("hidden");
            return;
        }
        
        // Check response status
        if (!res.ok) {
            errorMsg.textContent = data.detail || data.message || `Server error: ${res.status}`;
            errorMsg.classList.remove("hidden");
            return;
        }
        
        // Handle success response
        if (data && data.success === true) {
            window.location.href = "/app";
        } else {
            errorMsg.textContent = data.detail || data.message || "Invalid credentials";
            errorMsg.classList.remove("hidden");
        }
    } catch (error) {
        console.error("Login error:", error);
        let errorText = "Connection error. Please try again.";
        if (error.message) {
            if (error.message.includes("Failed to fetch") || error.message.includes("NetworkError") || error.message.includes("fetch")) {
                errorText = "Cannot connect to server. Make sure the server is running on http://127.0.0.1:8000";
            } else {
                errorText = `Error: ${error.message}`;
            }
        }
        errorMsg.textContent = errorText;
        errorMsg.classList.remove("hidden");
    } finally {
        loginBtn.disabled = false;
        loginText.classList.remove("hidden");
        loginSpinner.classList.add("hidden");
    }
};
</script>
</body>
</html>
