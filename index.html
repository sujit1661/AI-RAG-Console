<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI RAG Console - Mega Project</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

<script>
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: { primary: "#ff2e62", "matte-black": "#0A0A0A", charcoal: "#111111" },
            fontFamily: { display: ["Space Grotesk", "sans-serif"] }
        }
    }
}
</script>

<style>
body { background: #000; color: #f1f5f9; font-family: 'Space Grotesk', sans-serif; }
.neon-border { border: 1px solid rgba(255,46,98,0.3); box-shadow: 0 0 15px rgba(255,46,98,0.1); }
.ai-bubble { border-left: 3px solid #ff2e62; background: #0D0D0D; }
.workspace-item.active { border-color: #ff2e62; background: rgba(255,46,98,0.1); color: white; }
.chat-item.active { border-color: #ff2e62; background: rgba(255,46,98,0.1); color: white; }

/* FIXED LOCKED STYLE */
.locked-section {
    opacity: 0.3;
    filter: grayscale(1);
}

.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

.spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #ff2e62;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Thinking animation */
.thinking-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
}

.thinking-dot {
    width: 8px;
    height: 8px;
    background: #ff2e62;
    border-radius: 50%;
    animation: thinking-bounce 1.4s infinite ease-in-out;
}

.thinking-dot:nth-child(1) { animation-delay: -0.32s; }
.thinking-dot:nth-child(2) { animation-delay: -0.16s; }
.thinking-dot:nth-child(3) { animation-delay: 0s; }

@keyframes thinking-bounce {
    0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
    40% { transform: scale(1.2); opacity: 1; }
}
</style>
</head>

<h2 class="text-xl font-bold tracking-[0.2em] text-white">INDEXING DATA</h2>

<div class="w-3 h-3 bg-primary rounded-full animate-pulse"></div>
<h1 class="text-lg font-bold tracking-tighter uppercase">RAG<span class="text-primary font-black">CORE</span></h1>
</div>

NO WORKSPACE SELECTED
</div>
<div class="flex items-center gap-2">
<button onclick="showProfile()" class="text-[10px] font-bold bg-white/5 border border-white/10 px-4 py-1.5 rounded-full text-slate-400 hover:text-primary hover:border-primary/50 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-sm">account_circle</span>

</button>

<span class="material-symbols-outlined text-sm">logout</span>
Logout
</button>

</header>

<div class="flex flex-1 overflow-hidden">

<aside class="w-80 bg-matte-black border-r border-white/5 flex flex-col overflow-hidden">
<!-- New Workspace Button -->
<div class="p-4 border-b border-white/5">
<button onclick="createNewWorkspace()" class="w-full bg-primary/10 hover:bg-primary/20 border border-primary/30 hover:border-primary/50 text-primary px-4 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all">

class="w-full bg-transparent border-none text-white placeholder-slate-600 focus:ring-0 px-4 py-3 text-sm"/>

<script>
const API_BASE = "http://127.0.0.1:8000";
let activeWS = null;
let activeChatId = null;

// Check authentication on load
async function checkAuth() {
    try {
        const res = await fetch(`${API_BASE}/auth/check`, {
            credentials: "include"
        });
        const data = await res.json();
        if (!data.authenticated) {
            window.location.href = "/login";
            return false;
        }
        return true;
    } catch (error) {
        window.location.href = "/login";
        return false;
    }
}

// Load user info and initialize
let currentUser = null;

async function loadUserInfo() {
    try {
        const res = await fetch(`${API_BASE}/auth/user`, {
            credentials: "include"
        });
        if (res.ok) {
            const data = await res.json();
            currentUser = data;
            document.getElementById("usernameDisplay").textContent = data.username;
        }
    } catch (error) {
        console.error("Error loading user info:", error);
    }
}

function showProfile() {
    if (!currentUser) {
        loadUserInfo().then(() => {
            if (currentUser) {
                alert(`Username: ${currentUser.username}\nEmail: ${currentUser.user_info?.email || "Not set"}\nCreated: ${currentUser.user_info?.created_at ? new Date(currentUser.user_info.created_at).toLocaleDateString() : "Unknown"}`);
            }
        });
    } else {
        alert(`Username: ${currentUser.username}\nEmail: ${currentUser.user_info?.email || "Not set"}\nCreated: ${currentUser.user_info?.created_at ? new Date(currentUser.user_info.created_at).toLocaleDateString() : "Unknown"}`);
    }
}

window.onload = async () => {
    const authenticated = await checkAuth();
    if (authenticated) {
        await loadUserInfo();
        refreshWorkspaces();
    } else {
        // Redirect to landing page if not authenticated
        window.location.href = "/";
    }
};

async function refreshWorkspaces() {
try {
const res = await fetch(`${API_BASE}/workspace/list`, {
    credentials: "include"
});
const data = await res.json();
const container = document.getElementById("workspaceList");
container.innerHTML = "";

if(data.workspaces.length === 0) {
    container.innerHTML = `
    <div class="text-center py-8 text-slate-500 text-sm">
        <span class="material-symbols-outlined text-4xl mb-2 opacity-50">folder_off</span>
        <p>No workspaces yet</p>
        <p class="text-xs mt-1">Create one to get started</p>
    </div>`;
    return;
}

data.workspaces.forEach(ws => {
const isActive = (typeof ws === 'string' ? ws : ws.slug) === activeWS;
const wsName = typeof ws === 'string' ? ws : ws.name;
const wsSlug = typeof ws === 'string' ? ws : ws.slug;
const lastMessage = typeof ws === 'object' ? (ws.last_message || 'No messages yet') : null;
const messageCount = typeof ws === 'object' ? ws.message_count : 0;

const div = document.createElement("div");
div.className = `workspace-item p-3 rounded-lg border border-white/5 cursor-pointer group ${isActive?'active':''}`;
div.onclick = () => switchWorkspace(wsSlug);

div.innerHTML = `
<div class="flex items-start justify-between gap-2">
    <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1">
            <span class="material-symbols-outlined text-sm text-slate-400">folder</span>
            <span class="font-semibold text-sm truncate">${escapeHtml(wsName)}</span>
        </div>
        ${lastMessage ? `<div class="workspace-preview">${escapeHtml(lastMessage)}</div>` : ''}
        ${messageCount > 0 ? `<div class="text-[9px] text-slate-500 mt-1">${messageCount} message${messageCount !== 1 ? 's' : ''}</div>` : ''}
    </div>
    <button onclick="event.stopPropagation(); deleteWS('${wsSlug}')" class="opacity-0 group-hover:opacity-100 hover:text-primary transition-opacity p-1">
        <span class="material-symbols-outlined text-sm">delete</span>
    </button>
</div>`;

container.appendChild(div);
});
} catch(error) {
    console.error("Error refreshing workspaces:", error);
}
}

async function switchWorkspace(name) {
if(activeWS === name) return; // Already active

activeWS = name;
activeChatId = null;

// Update UI
document.getElementById("wsBadge").innerText = `ACTIVE: ${name.toUpperCase()}`;
document.getElementById("librarySection").classList.remove("locked-section");
document.getElementById("chatSection").classList.remove("locked-section");
document.getElementById("inputWrapper").classList.remove("locked-section");

const chatInput = document.getElementById("chatInput");
chatInput.disabled = false;
chatInput.focus();

// Refresh workspace list to show active state
refreshWorkspaces();

// Clear and load chat history
const chatBox = document.getElementById("chatContainer");
chatBox.innerHTML = "";
await loadChats();
refreshLibrary();
}

async function loadChats() {
    if (!activeWS) return;

    const chatListEl = document.getElementById("chatList");
    chatListEl.innerHTML = "";

    try {
        const res = await fetch(`${API_BASE}/workspace/${activeWS}/chats`, { credentials: "include" });
        const data = await res.json();
        const chats = data.chats || [];
        document.getElementById("chatCount").innerText = chats.length;

        if (chats.length === 0) {
            // Create a first chat automatically to keep UX simple
            await createNewChat(false);
            return;
        }

        // Select the most recent chat by default
        if (!activeChatId) activeChatId = chats[0].id;

        chats.forEach(c => {
            const isActive = c.id === activeChatId;
            const div = document.createElement("div");
            div.className = `chat-item p-2.5 rounded-lg border border-white/5 cursor-pointer group flex items-start justify-between gap-2 ${isActive ? "active" : ""}`;
            div.onclick = () => selectChat(c.id);

            div.innerHTML = `
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm text-slate-400">chat</span>
                        <span class="text-xs font-semibold truncate">${escapeHtml(c.title || "Chat")}</span>
                    </div>
                    <div class="text-[9px] text-slate-600 mt-1">${c.updated_at ? new Date(c.updated_at).toLocaleString() : ""}</div>
                </div>
                <button onclick="event.stopPropagation(); deleteChat('${c.id}')" class="opacity-0 group-hover:opacity-100 hover:text-primary transition-opacity p-1 rounded hover:bg-white/10 flex-shrink-0" title="Delete chat">
                    <span class="material-symbols-outlined text-sm">delete</span>
                </button>
            `;
            chatListEl.appendChild(div);
        });

        await selectChat(activeChatId);
    } catch (error) {
        console.error("Error loading chats:", error);
        document.getElementById("chatCount").innerText = "0";
        chatListEl.innerHTML = '<p class="text-xs text-red-400 text-center py-3">Error loading chats</p>';
        addBubble("Error loading chats for this workspace.", "assistant");
    }
}

async function selectChat(chatId) {
    if (!activeWS) return;
    activeChatId = chatId;

    // Refresh chat list active state
    await loadChatHistory();
    await loadChatsListOnly();
}

async function loadChatsListOnly() {
    // Helper to avoid reloading history twice when we just need active highlight updates
    if (!activeWS) return;
    try {
        const res = await fetch(`${API_BASE}/workspace/${activeWS}/chats`, { credentials: "include" });
        const data = await res.json();
        const chats = data.chats || [];
        document.getElementById("chatCount").innerText = chats.length;
        const chatListEl = document.getElementById("chatList");
        chatListEl.innerHTML = "";
        chats.forEach(c => {
            const isActive = c.id === activeChatId;
            const div = document.createElement("div");
            div.className = `chat-item p-2.5 rounded-lg border border-white/5 cursor-pointer group flex items-start justify-between gap-2 ${isActive ? "active" : ""}`;
            div.onclick = () => selectChat(c.id);
            div.innerHTML = `
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm text-slate-400">chat</span>
                        <span class="text-xs font-semibold truncate">${escapeHtml(c.title || "Chat")}</span>
                    </div>
                    <div class="text-[9px] text-slate-600 mt-1">${c.updated_at ? new Date(c.updated_at).toLocaleString() : ""}</div>
                </div>
                <button onclick="event.stopPropagation(); deleteChat('${c.id}')" class="opacity-0 group-hover:opacity-100 hover:text-primary transition-opacity p-1 rounded hover:bg-white/10 flex-shrink-0" title="Delete chat">
                    <span class="material-symbols-outlined text-sm">delete</span>
                </button>
            `;
            chatListEl.appendChild(div);
        });
    } catch (e) {
        // ignore
    }
}

async function loadChatHistory() {
    const chatBox = document.getElementById("chatContainer");
    chatBox.innerHTML = "";

    if (!activeWS || !activeChatId) {
        addBubble("Select or create a chat to start.", "assistant");
        return;
    }

    try {
        const histRes = await fetch(`${API_BASE}/workspace/${activeWS}/history?chat_id=${encodeURIComponent(activeChatId)}`, {
            credentials: "include"
        });
        const histData = await histRes.json();

        if (!histData.history || histData.history.length === 0) {
            addBubble("Chat ready. Upload files to begin, then ask questions.", "assistant");
        } else {
            histData.history.forEach(m => {
                if (m.role === "user" || m.role === "assistant") addBubble(m.content, m.role);
            });
            setTimeout(() => {
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 100);
        }
    } catch (error) {
        console.error("Error loading chat history:", error);
        addBubble("Error loading chat history.", "assistant");
    }
}

async function createNewWorkspace(){
const name=prompt("Enter workspace name:");
if(!name || !name.trim())return;

try {
const res=await fetch(`${API_BASE}/workspace/create`,{
method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({workspace_name:name.trim()})
});

if(!res.ok) {
    const error = await res.json();
    alert(`Error: ${error.detail || "Failed to create workspace"}`);
    return;
}

const data=await res.json();
refreshWorkspaces();
switchWorkspace(data.slug);
} catch(error) {
    alert(`Error creating workspace: ${error.message}`);
}
}

async function deleteWS(name){
if(!confirm(`Are you sure you want to delete workspace "${name}"? This will delete all files and chat history.`)) {
    return;
}

try {
const res = await fetch(`${API_BASE}/workspace/delete`,{
method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({workspace_name:name})
});

if(!res.ok) {
    const error = await res.json();
    alert(`Error: ${error.detail || "Failed to delete workspace"}`);
    return;
}

if(activeWS === name) {
    activeWS = null;
    activeChatId = null;
    document.getElementById("chatContainer").innerHTML = '<div class="ai-bubble p-6 rounded-xl border border-white/5 max-w-2xl shadow-2xl"><p class="text-sm text-slate-400">Select a workspace to start.</p></div>';
    document.getElementById("librarySection").classList.add("locked-section");
    document.getElementById("chatSection").classList.add("locked-section");
    document.getElementById("inputWrapper").classList.add("locked-section");
    document.getElementById("chatInput").disabled = true;
    document.getElementById("wsBadge").innerText = "NO WORKSPACE SELECTED";
}

refreshWorkspaces();
} catch(error) {
    alert(`Error deleting workspace: ${error.message}`);
}
}

document.getElementById("uploadBtn").onclick=()=>document.getElementById("fileInput").click();
document.getElementById("newChatBtn").onclick=()=>createNewChat(true);

async function createNewChat(promptForTitle=true){
    if(!activeWS){
        alert("Please select a workspace first");
        return;
    }

    let title = "";
    if (promptForTitle) {
        title = prompt("Chat title (optional):") || "";
    }

    try {
        const res = await fetch(`${API_BASE}/chat/create`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            credentials: "include",
            body: JSON.stringify({workspace_name: activeWS, chat_title: title})
        });
        const data = await res.json();
        if (!res.ok) {
            alert(`Error creating chat: ${data.detail || "Unknown error"}`);
            return;
        }
        activeChatId = data.chat?.id;
        await loadChats();
    } catch (e) {
        alert(`Error creating chat: ${e.message}`);
    }
}

async function deleteChat(chatId){
    if(!activeWS) return;
    if(!confirm("Delete this chat thread? This cannot be undone.")) return;

    try{
        const res = await fetch(`${API_BASE}/chat/delete`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            credentials: "include",
            body: JSON.stringify({workspace_name: activeWS, chat_id: chatId})
        });
        const data = await res.json();
        if(!res.ok){
            alert(`Error deleting chat: ${data.detail || "Unknown error"}`);
            return;
        }
        if(activeChatId === chatId) activeChatId = null;
        await loadChats();
    }catch(e){
        alert(`Error deleting chat: ${e.message}`);
    }
}

document.getElementById("fileInput").onchange=async()=>{
const file=document.getElementById("fileInput").files[0];
if(!file)return;

if(!activeWS){
    alert("Please select a workspace first");
    document.getElementById("fileInput").value="";
    return;
}

// Validate file type
const allowedExts=['.pdf','.docx','.xlsx','.xls','.png','.jpg','.jpeg'];
const fileExt='.'+file.name.split('.').pop()?.toLowerCase();
if(!allowedExts.includes(fileExt)){
    alert(`File type not supported. Please upload: ${allowedExts.join(', ')}`);
    document.getElementById("fileInput").value="";
    return;
}

document.getElementById("loadingOverlay").classList.remove("hidden");

const formData=new FormData();
formData.append("file",file);

try{
const res=await fetch(`${API_BASE}/upload?workspace_name=${activeWS}`,{
    method:"POST",
    credentials:"include",
    body:formData
});

const data=await res.json();

if(!res.ok){
    alert(`Upload failed: ${data.detail || "Unknown error"}`);
}else{
    // Show success message
    const container=document.getElementById("libraryContainer");
    const tempMsg=document.createElement("div");
    tempMsg.className="text-xs text-primary text-center py-2 animate-pulse";
    tempMsg.textContent=`✓ "${file.name}" uploaded and indexed (${data.chunks || 0} chunks)`;
    container.insertBefore(tempMsg,container.firstChild);
    setTimeout(()=>tempMsg.remove(),3000);
}
}catch(error){
alert(`Upload error: ${error.message}`);
}finally{
document.getElementById("loadingOverlay").classList.add("hidden");
document.getElementById("fileInput").value="";
refreshLibrary();
}
};

function getFileIcon(filename){
const ext=filename.split('.').pop()?.toLowerCase();
const icons={
    'pdf':'description',
    'docx':'description',
    'doc':'description',
    'xlsx':'table_chart',
    'xls':'table_chart',
    'png':'image',
    'jpg':'image',
    'jpeg':'image'
};
return icons[ext]||'insert_drive_file';
}

async function refreshLibrary(){
if(!activeWS){
    document.getElementById("libraryContainer").innerHTML='<p class="text-xs text-slate-500 text-center py-4">Select a workspace to view files</p>';
    document.getElementById("fileCount").innerText="0";
    return;
}

try{
const res=await fetch(`${API_BASE}/workspace/${activeWS}/files`,{
    credentials:"include"
});
const data=await res.json();
const container=document.getElementById("libraryContainer");
container.innerHTML="";
document.getElementById("fileCount").innerText=data.files.length;

if(data.files.length===0){
    container.innerHTML='<div class="text-center py-6"><span class="material-symbols-outlined text-3xl text-slate-600 mb-2 block">folder_open</span><p class="text-xs text-slate-500">No files uploaded yet</p><p class="text-[10px] text-slate-600 mt-1">Upload documents to get started</p></div>';
    return;
}

data.files.forEach(f=>{
const div=document.createElement("div");
div.className="group p-2.5 bg-white/5 border border-white/10 rounded-lg hover:bg-white/10 hover:border-primary/30 transition-all flex items-center justify-between gap-2";
div.innerHTML=`
    <div class="flex items-center gap-2 flex-1 min-w-0">
        <span class="material-symbols-outlined text-sm text-slate-400 flex-shrink-0">${getFileIcon(f)}</span>
        <span class="text-xs text-slate-300 truncate" title="${escapeHtml(f)}">${escapeHtml(f)}</span>
    </div>
    <button class="delete-file-btn opacity-0 group-hover:opacity-100 hover:text-primary transition-opacity p-1 rounded hover:bg-white/10 flex-shrink-0" title="Delete file" data-filename="${escapeHtml(f)}">
        <span class="material-symbols-outlined text-sm">delete</span>
    </button>`;
// Add event listener to avoid inline onclick with escaped strings
const deleteBtn=div.querySelector('.delete-file-btn');
deleteBtn.addEventListener('click',()=>deleteFile(f));
container.appendChild(div);
});
}catch(error){
console.error("Error refreshing library:",error);
document.getElementById("libraryContainer").innerHTML='<p class="text-xs text-red-400 text-center py-4">Error loading files</p>';
}
}

async function deleteFile(filename){
if(!confirm(`Are you sure you want to delete "${filename}"?\n\nThis will remove the file and all its indexed content from the workspace.`)){
    return;
}

try{
const res=await fetch(`${API_BASE}/delete-file`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    credentials:"include",
    body:JSON.stringify({workspace_name:activeWS,filename})
});

if(!res.ok){
    const error=await res.json();
    alert(`Error deleting file: ${error.detail||"Unknown error"}`);
    return;
}

// Show success feedback
const container=document.getElementById("libraryContainer");
const tempMsg=document.createElement("div");
tempMsg.className="text-xs text-primary text-center py-2";
tempMsg.textContent=`"${filename}" deleted successfully`;
container.insertBefore(tempMsg,container.firstChild);
setTimeout(()=>tempMsg.remove(),2000);

refreshLibrary();
}catch(error){
alert(`Error deleting file: ${error.message}`);
}
}

async function sendMessage(){
const input=document.getElementById("chatInput");
const val=input.value.trim();
if(!val||!activeWS)return;
if(!activeChatId){
    await createNewChat(false);
    if(!activeChatId) return;
}

// Create chat if none exists
// Workspace switching handled in switchWorkspace function

addBubble(val,"user");
input.value="";
input.disabled=true;
document.getElementById("sendBtn").disabled=true;

// Show thinking animation
const thinkingBubbleId=showThinkingAnimation();

try{
const res=await fetch(`${API_BASE}/chat/stream`,{
method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({workspace_name:activeWS,question:val,chat_id:activeChatId})
});

if(!res.ok){
    throw new Error(`HTTP error! status: ${res.status}`);
}

const reader=res.body.getReader();
const decoder=new TextDecoder();
let buffer="";
let fullAnswer="";
let pageNumbers=[];
let tokenUsage={prompt_tokens:0,completion_tokens:0,total_tokens:0};

while(true){
    const {done,value}=await reader.read();
    if(done)break;

    buffer+=decoder.decode(value,{stream:true});
    const lines=buffer.split("\n\n");
    buffer=lines.pop()||"";

    for(const line of lines){
        if(line.startsWith("data: ")){
            try{
                const data=JSON.parse(line.slice(6));
                if(data.type==="chunk"){
                    fullAnswer+=data.content;
                    updateBubble(thinkingBubbleId,fullAnswer);
                }else if(data.type==="metadata"){
                    // Capture metadata (page numbers and token usage)
                    if(data.page_numbers)pageNumbers=data.page_numbers;
                    if(data.token_usage)tokenUsage=data.token_usage;
                }else if(data.type==="done"){
                    // Finalize with any metadata we've received
                    removeThinkingAnimation(thinkingBubbleId);
                    finalizeBubble(thinkingBubbleId,fullAnswer,pageNumbers,tokenUsage);
                    // Refresh chat list to update title/timestamp
                    loadChatsListOnly();
                    break;
                }else if(data.type==="error"){
                    removeThinkingAnimation(thinkingBubbleId);
                    updateBubble(thinkingBubbleId,data.content);
                    break;
                }
            }catch(e){
                console.error("Error parsing SSE data:",e);
            }
        }
    }
}
}catch(error){
removeThinkingAnimation(thinkingBubbleId);
addBubble(`Error: ${error.message}`,"assistant");
}finally{
input.disabled=false;
document.getElementById("sendBtn").disabled=false;
input.focus();
}
}

function addBubble(text,role){
const chat=document.getElementById("chatContainer");
const div=document.createElement("div");
div.className=role==="user"?"flex justify-end":"flex justify-start";
const bubbleId="bubble-"+Date.now();
div.id=bubbleId;
div.innerHTML=`<div class="p-5 rounded-2xl text-sm max-w-[80%] ${role==="user"?"bg-charcoal":"ai-bubble"}">${escapeHtml(text)}</div>`;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
return bubbleId;
}

function showThinkingAnimation(){
const chat=document.getElementById("chatContainer");
const div=document.createElement("div");
div.className="flex justify-start";
const bubbleId="thinking-"+Date.now();
div.id=bubbleId;
div.innerHTML=`<div class="p-5 rounded-2xl text-sm max-w-[80%] ai-bubble">
    <div class="thinking-dots">
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
    </div>
</div>`;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
return bubbleId;
}

function updateBubble(bubbleId,text){
const bubble=document.getElementById(bubbleId);
if(bubble){
    const contentDiv=bubble.querySelector("div");
    if(contentDiv){
        contentDiv.innerHTML=escapeHtml(text);
        contentDiv.classList.remove("thinking-dots");
        document.getElementById("chatContainer").scrollTop=document.getElementById("chatContainer").scrollHeight;
    }
}
}

function finalizeBubble(bubbleId,text,pageNumbers=[],tokenUsage={}){
const bubble=document.getElementById(bubbleId);
if(bubble){
    const contentDiv=bubble.querySelector("div");
    if(contentDiv){
        contentDiv.innerHTML=escapeHtml(text);
        contentDiv.classList.remove("thinking-dots");
        
        // Add metadata box if we have page numbers or token usage
        if(pageNumbers.length>0||tokenUsage.total_tokens>0){
            const metadataBox=document.createElement("div");
            metadataBox.className="mt-3 pt-3 border-t border-white/10 text-[10px] text-slate-500 flex items-center gap-4 flex-wrap";
            
            let metadataHTML="";
            
            // Page numbers
            if(pageNumbers.length>0){
                const pagesText=pageNumbers.length===1?`Page ${pageNumbers[0]}`:`Pages ${pageNumbers.join(", ")}`;
                metadataHTML+=`<span class="flex items-center gap-1"><span class="material-symbols-outlined text-xs">description</span>${pagesText}</span>`;
            }
            
            // Token usage
            if(tokenUsage.total_tokens>0){
                const tokensText=`${tokenUsage.total_tokens.toLocaleString()} tokens (${tokenUsage.prompt_tokens.toLocaleString()}+${tokenUsage.completion_tokens.toLocaleString()})`;
                metadataHTML+=`<span class="flex items-center gap-1"><span class="material-symbols-outlined text-xs">memory</span>${tokensText}</span>`;
            }
            
            metadataBox.innerHTML=metadataHTML;
            contentDiv.appendChild(metadataBox);
        }
    }
}
}

function removeThinkingAnimation(bubbleId){
// Already handled in updateBubble/finalizeBubble
}

function escapeHtml(text){
const div=document.createElement("div");
div.textContent=text;
return div.innerHTML;
}

document.getElementById("sendBtn").onclick=sendMessage;
document.getElementById("chatInput").onkeypress=(e)=>{if(e.key==="Enter")sendMessage();}

async function logout() {
    try {
        await fetch(`${API_BASE}/auth/logout`, {
            method: "POST",
            credentials: "include"
        });
        window.location.href = "/";
    } catch (error) {
        window.location.href = "/";
    }
}

// Add credentials to all fetch calls
const originalFetch = window.fetch;
window.fetch = function(...args) {
    if (args[1]) {
        args[1].credentials = args[1].credentials || "include";
    } else {
        args[1] = { credentials: "include" };
    }
    return originalFetch.apply(this, args);
};
