<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAGCORE — Monitoring</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#ff2e62"}}}}</script>
<style>
*{box-sizing:border-box;}
body{background:#000;color:#f1f5f9;font-family:'Space Grotesk',sans-serif;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px;}
.card{background:#0a0a0a;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px 24px;}
.status-ok{color:#10b981;} .status-err{color:#ef4444;} .status-warn{color:#f59e0b;}
.mono{font-family:'JetBrains Mono',monospace;font-size:.72rem;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:.62rem;font-weight:700;}
.chip-green{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#10b981;}
.chip-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;}
.chip-yellow{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#f59e0b;}
.chip-blue{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:#818cf8;}
.chip-gray{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#64748b;}
</style>
</head>
<body class="min-h-screen">

<header class="h-14 border-b border-white/5 bg-[#0A0A0A] flex items-center justify-between px-6 sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <a href="/app" class="flex items-center gap-2">
      <div class="w-2.5 h-2.5 bg-primary rounded-full animate-pulse"></div>
      <span class="text-base font-bold tracking-tighter uppercase">RAG<span class="text-primary font-black">CORE</span></span>
    </a>
    <div class="flex items-center bg-white/5 border border-white/10 rounded-xl p-1 gap-0.5">
      <a href="/app"        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all"><span class="material-symbols-outlined text-sm">folder_open</span><span class="hidden sm:inline">RAG</span></a>
      <a href="/ai-chat"    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all"><span class="material-symbols-outlined text-sm">smart_toy</span><span class="hidden sm:inline">AI Chat</span></a>
      <a href="/dashboard"  class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all"><span class="material-symbols-outlined text-sm">dashboard</span><span class="hidden sm:inline">Dashboard</span></a>
      <a href="/monitoring" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold bg-primary/20 text-primary border border-primary/30"><span class="material-symbols-outlined text-sm">monitor_heart</span><span class="hidden sm:inline">Monitor</span></a>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <a href="/profile"  class="text-[10px] font-bold bg-white/5 border border-white/10 px-3 py-1.5 rounded-full text-slate-400 hover:text-primary transition-all flex items-center gap-1.5"><span class="material-symbols-outlined text-sm">account_circle</span><span id="usernameDisplay">—</span></a>
    <a href="/settings" class="text-[10px] font-bold bg-white/5 border border-white/10 px-3 py-1.5 rounded-full text-slate-400 hover:text-primary transition-all flex items-center gap-1.5"><span class="material-symbols-outlined text-sm">settings</span></a>
    <button onclick="doLogout()" class="text-[10px] font-bold bg-white/5 border border-white/10 px-3 py-1.5 rounded-full text-slate-400 hover:text-primary transition-all flex items-center gap-1.5"><span class="material-symbols-outlined text-sm">logout</span></button>
  </div>
</header>

<div class="max-w-5xl mx-auto px-6 py-8">
  <div class="mb-8 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-black mb-1">System Monitoring</h1>
      <p class="text-sm text-slate-500">Real-time health of all connected services and models.</p>
    </div>
    <button onclick="refresh()" class="flex items-center gap-2 bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-xs font-bold text-slate-400 hover:text-white hover:border-white/20 transition-all">
      <span class="material-symbols-outlined text-sm">refresh</span>Refresh
    </button>
  </div>

  <!-- Uptime banner -->
  <div id="uptimeBanner" class="card mb-6 flex items-center gap-4">
    <div class="w-10 h-10 rounded-xl bg-green-500/10 border border-green-500/20 flex items-center justify-center flex-shrink-0">
      <span class="material-symbols-outlined text-green-400 text-lg">check_circle</span>
    </div>
    <div>
      <p class="text-sm font-bold text-green-400">All systems operational</p>
      <p class="text-xs text-slate-500">Uptime: <span id="uptimeVal">—</span></p>
    </div>
    <div class="ml-auto text-right">
      <p class="text-xs text-slate-500">Environment</p>
      <span id="envChip" class="chip chip-gray">—</span>
    </div>
  </div>

  <!-- Services grid -->
  <div class="grid md:grid-cols-3 gap-4 mb-8" id="servicesGrid">
    <div class="card col-span-3 flex items-center justify-center py-8">
      <div class="w-5 h-5 border-2 border-white/10 border-t-primary rounded-full animate-spin mr-3"></div>
      <span class="text-sm text-slate-500">Checking services…</span>
    </div>
  </div>

  <!-- Error log -->
  <p class="text-[.6rem] font-[800] tracking-[.12em] uppercase text-slate-600 mb-3">Recent Errors</p>
  <div class="card">
    <div id="errorLog" class="space-y-2">
      <div class="flex items-center justify-center py-6 text-slate-600 text-sm">Loading…</div>
    </div>
  </div>
</div>

<script>
function esc(s){const d=document.createElement("div");d.textContent=String(s||"");return d.innerHTML;}
function relTime(iso){if(!iso)return "";const diff=Date.now()-new Date(iso).getTime();const m=Math.floor(diff/60000);if(m<1)return "just now";if(m<60)return m+"m ago";const h=Math.floor(m/60);if(h<24)return h+"h ago";return Math.floor(h/24)+"d ago";}
async function doLogout(){try{await fetch("/auth/logout",{method:"POST",credentials:"include"});}catch{}location.href="/";}

function svcCard(label, icon, color, ok, detail, extra) {
  const chip = ok
    ? '<span class="chip chip-green"><span class="material-symbols-outlined text-xs">check</span>OK</span>'
    : '<span class="chip chip-red"><span class="material-symbols-outlined text-xs">error</span>Error</span>';
  return `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:36px;height:36px;border-radius:10px;background:${color}18;border:1px solid ${color}30;display:flex;align-items:center;justify-content:center;">
          <span class="material-symbols-outlined" style="font-size:18px;color:${color};">${icon}</span>
        </div>
        <span style="font-size:.82rem;font-weight:700;">${esc(label)}</span>
      </div>
      ${chip}
    </div>
    <p style="font-size:.68rem;color:#475569;">${esc(detail)}</p>
    ${extra ? `<p style="font-size:.62rem;color:#334155;margin-top:4px;">${extra}</p>` : ""}
  </div>`;
}

async function refresh() {
  try {
    const r = await fetch("/monitoring/status", {credentials:"include"});
    if (!r.ok) return;
    const d = await r.json();

    document.getElementById("uptimeVal").textContent = d.uptime_fmt || "—";
    document.getElementById("envChip").textContent = d.environment || "—";
    document.getElementById("envChip").className = "chip " +
      (d.environment === "production" ? "chip-green" : "chip-yellow");

    const sup = d.supabase || {};
    const bm  = d.bm25 || {};
    const emb = d.embedding_model || {};
    const chdb = d.chromadb || {};

    document.getElementById("servicesGrid").innerHTML =
      svcCard("Supabase", "database", "#3b82f6",
        sup.ok,
        sup.ok ? `Latency: ${sup.latency_ms}ms` : sup.error || "Unreachable",
        "pgvector · Storage · Auth") +
      svcCard("Embedding Model", "hub", "#06b6d4",
        emb.ok,
        emb.ok ? `BAAI/bge-small-en-v1.5 · ${emb.dims} dims` : emb.error || "Not loaded",
        emb.loaded ? "Loaded in memory" : "Will load on first query") +
      svcCard("BM25 Index", "spellcheck", "#f59e0b",
        bm.ok,
        bm.ok ? `${bm.indexes_in_memory || 0} indexes in memory` : bm.error || "—",
        bm.keys?.length ? "Keys: " + bm.keys.slice(0,3).join(", ") + (bm.keys.length > 3 ? "…" : "") : null) +
      svcCard("ChromaDB", "storage", "#8b5cf6",
        chdb.available,
        chdb.available ? "Available (local fallback)" : "Not available — Supabase-only mode",
        "Used as fallback when Supabase is unreachable") +
      svcCard("Groq API", "smart_toy", "#ff2e62",
        d.groq?.ok,
        d.groq?.key_set ? "API key configured" : "GROQ_API_KEY not set",
        "LLM + Vision model inference") +
      svcCard("Cohere Rerank", "sort", "#10b981",
        d.cohere?.key_set,
        d.cohere?.key_set ? "API key configured — reranking enabled" : "COHERE_API_KEY not set — using RRF order",
        "Optional — cross-encoder reranking");

  } catch(e) {
    document.getElementById("servicesGrid").innerHTML =
      `<div class="card col-span-3 text-center py-6 text-red-400 text-sm">Failed to load status: ${esc(e.message)}</div>`;
  }
}

async function loadErrors() {
  try {
    const r = await fetch("/monitoring/logs?limit=20", {credentials:"include"});
    const d = await r.json();
    const errs = d.errors || [];
    const el = document.getElementById("errorLog");
    if (!errs.length) {
      el.innerHTML = '<p style="text-align:center;color:#334155;font-size:.75rem;padding:16px 0;">No errors recorded — looking good ✓</p>';
      return;
    }
    el.innerHTML = errs.map(e =>
      `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);">
        <span class="material-symbols-outlined chip-red" style="font-size:14px;color:#ef4444;flex-shrink:0;margin-top:2px;">error</span>
        <div style="flex:1;min-width:0;">
          <p style="font-size:.72rem;color:#fca5a5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(e.question || "—")}</p>
          <p style="font-size:.62rem;color:#334155;margin-top:2px;">${esc(e.workspace_slug||"—")} · ${relTime(e.created_at)}</p>
        </div>
        <span class="chip chip-red" style="flex-shrink:0;">ERROR</span>
      </div>`
    ).join("");
  } catch {}
}

async function loadUsername() {
  try {
    const r = await fetch("/auth/user", {credentials:"include"});
    if (r.ok) { const d = await r.json(); document.getElementById("usernameDisplay").textContent = d.username||"—"; }
    else location.href = "/login";
  } catch { location.href = "/login"; }
}

window.onload = async () => {
  await loadUsername();
  await Promise.all([refresh(), loadErrors()]);
};
</script>
</body>
</html>
