<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAGCORE — AI Chat</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: { primary: "#ff2e62", "matte-black": "#0A0A0A", charcoal: "#111111" },
    fontFamily: { display: ["Space Grotesk", "sans-serif"] }
  }}
}
</script>
<style>
body { background: #000; color: #f1f5f9; font-family: 'Space Grotesk', sans-serif; visibility: hidden; }
.neon-border { border: 1px solid rgba(255,46,98,0.3); box-shadow: 0 0 15px rgba(255,46,98,0.1); }
.ai-bubble { border-left: 3px solid #ff2e62; background: #0D0D0D; }
.ai-bubble h2 { font-size: 1rem; color: #ff2e62; font-weight: 700; margin: .75em 0 .4em; }
.ai-bubble h3 { font-size: .9rem; font-weight: 700; margin: .75em 0 .4em; }
.ai-bubble p { margin: .4em 0; line-height: 1.6; }
.ai-bubble ul, .ai-bubble ol { padding-left: 1.4em; margin: .4em 0; }
.ai-bubble li { margin: .25em 0; line-height: 1.5; }
.ai-bubble strong { color: #f1f5f9; font-weight: 600; }
.ai-bubble code { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 1px 5px; font-size: .8em; color: #ff2e62; }
.ai-bubble pre { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 12px; overflow-x: auto; margin: .5em 0; }
.ai-bubble pre code { background: none; border: none; padding: 0; color: #e2e8f0; font-size: .82em; }
.ai-bubble table { width: 100%; border-collapse: collapse; margin: .5em 0; font-size: .82em; }
.ai-bubble th, .ai-bubble td { border: 1px solid #222; padding: 6px 10px; text-align: left; }
.ai-bubble th { background: #111; color: #ff2e62; }
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
.thinking-dots { display: inline-flex; gap: 4px; align-items: center; }
.thinking-dot { width: 8px; height: 8px; background: #ff2e62; border-radius: 50%; animation: tb 1.4s infinite ease-in-out; }
.thinking-dot:nth-child(1) { animation-delay: -.32s; }
.thinking-dot:nth-child(2) { animation-delay: -.16s; }
@keyframes tb { 0%,80%,100% { transform:scale(.8); opacity:.5; } 40% { transform:scale(1.2); opacity:1; } }
.spinner { border: 2px solid rgba(255,255,255,.1); border-top-color: #ff2e62; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
.chat-item { transition: all 0.15s; }
.chat-item:hover { background: rgba(255,46,98,0.05); border-color: rgba(255,46,98,0.2); }
.chat-item.active { border-color: #ff2e62 !important; background: rgba(255,46,98,0.1) !important; color: white; }
</style>
</head>

<body class="h-screen flex flex-col overflow-hidden">

<!-- ── Header ─────────────────────────────────────────────── -->
<header class="h-14 border-b border-white/5 bg-[#0A0A0A] flex items-center justify-between px-6 flex-shrink-0">
  <div class="flex items-center gap-3">
    <a href="/app" class="flex items-center gap-2">
      <div class="w-2.5 h-2.5 bg-primary rounded-full animate-pulse"></div>
      <h1 class="text-base font-bold tracking-tighter uppercase">RAG<span class="text-primary font-black">CORE</span></h1>
    </a>
    <div class="flex items-center bg-white/5 border border-white/10 rounded-xl p-1 gap-0.5">
      <a href="/app" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all">
        <span class="material-symbols-outlined text-sm">folder_open</span><span class="hidden sm:inline">Document RAG</span>
      </a>
      <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold bg-primary/20 text-primary border border-primary/30">
        <span class="material-symbols-outlined text-sm">smart_toy</span><span class="hidden sm:inline">AI Chat</span>
      </div>
      <a href="/playground" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all">
        <span class="material-symbols-outlined text-sm">biotech</span><span class="hidden sm:inline">Playground</span>
      </a>
      <a href="/pipeline" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all">
        <span class="material-symbols-outlined text-sm">account_tree</span><span class="hidden sm:inline">Pipeline</span>
      </a>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <span class="text-[10px] font-bold bg-white/5 border border-white/10 px-3 py-1.5 rounded-full text-slate-400 flex items-center gap-1.5">
      <span class="material-symbols-outlined text-sm">account_circle</span>
      <span id="usernameText">—</span>
    </span>
    <button onclick="logout()" class="text-[10px] font-bold bg-white/5 border border-white/10 px-3 py-1.5 rounded-full text-slate-400 hover:text-primary hover:border-primary/40 transition-all flex items-center gap-1.5">
      <span class="material-symbols-outlined text-sm">logout</span><span>Logout</span>
    </button>
  </div>
</header>

<div class="flex flex-1 overflow-hidden">

  <!-- ── Sidebar ─────────────────────────────────────────────── -->
  <aside class="w-72 bg-matte-black border-r border-white/5 flex flex-col overflow-hidden flex-shrink-0">
    <div class="p-4 border-b border-white/5">
      <button onclick="newSession()" class="w-full bg-primary/10 hover:bg-primary/20 border border-primary/30 hover:border-primary/50 text-primary px-4 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all">
        <span class="material-symbols-outlined text-lg">add</span>
        <span>New Chat</span>
      </button>
    </div>
    <div class="px-4 pt-3 pb-1">
      <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Sessions</label>
    </div>
    <div id="sessionList" class="flex-1 overflow-y-auto custom-scrollbar p-2 flex flex-col gap-1"></div>
    <div class="p-4 border-t border-white/5">
      <div class="bg-primary/5 border border-primary/20 rounded-xl p-3">
        <div class="flex items-center gap-2 mb-1.5">
          <span class="material-symbols-outlined text-primary text-sm">info</span>
          <span class="text-[10px] font-bold text-primary uppercase tracking-widest">AI Chat Mode</span>
        </div>
        <p class="text-[10px] text-slate-400 leading-relaxed">Uses general AI knowledge — not your documents. Switch to <a href="/app" class="text-primary hover:underline">Document RAG</a> for document Q&amp;A.</p>
      </div>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────────────── -->
  <main class="flex-1 flex flex-col bg-[#050505] relative overflow-hidden">
    <div id="chatContainer" class="flex-1 overflow-y-auto custom-scrollbar p-8 flex flex-col gap-6 pb-36"></div>
    <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black via-black/80 to-transparent">
      <div class="max-w-4xl mx-auto flex items-end bg-matte-black neon-border rounded-2xl p-2 gap-2">
        <textarea id="chatInput" rows="1" placeholder="Ask anything..."
          class="w-full bg-transparent border-none text-white placeholder-slate-600 focus:ring-0 px-4 py-3 text-sm resize-none overflow-hidden leading-relaxed"
          style="max-height:180px;" oninput="autoResize(this)"></textarea>
        <button id="sendBtn" onclick="sendMessage()"
          class="bg-primary text-white p-3 rounded-xl hover:scale-105 transition-all flex-shrink-0 self-end">
          <span class="material-symbols-outlined">send</span>
        </button>
      </div>
      <p class="text-center text-[10px] text-slate-600 mt-2">AI may make mistakes. Verify important information.</p>
    </div>
  </main>
</div>

<script>
const API_BASE = "";
let activeSessionId = null;
let sessions = [];

// ── Render session list ────────────────────────────────────────
function renderSessionList() {
  const container = document.getElementById("sessionList");
  if (sessions.length === 0) {
    container.innerHTML = `<div class="text-center py-8 text-slate-500">
      <span class="material-symbols-outlined text-4xl mb-2 opacity-50 block">chat_bubble_outline</span>
      <p class="text-xs">No chats yet</p>
    </div>`;
    return;
  }
  container.innerHTML = "";
  sessions.forEach(s => {
    const isActive = s.id === activeSessionId;
    const div = document.createElement("div");
    div.className = "chat-item p-3 rounded-lg border border-white/5 cursor-pointer group flex items-start justify-between gap-2" + (isActive ? " active" : "");
    div.addEventListener("click", () => selectSession(s.id));
    const ts = new Date(s.updated_at || s.created_at).toLocaleString();
    div.innerHTML =
      '<div class="flex-1 min-w-0">' +
        '<div class="flex items-center gap-2 mb-0.5">' +
          '<span class="material-symbols-outlined text-sm text-slate-400">chat</span>' +
          '<span class="text-xs font-semibold truncate">' + escapeHtml(s.title) + '</span>' +
        '</div>' +
        '<div class="text-[9px] text-slate-600">' + ts + '</div>' +
      '</div>' +
      '<button class="del-btn opacity-0 group-hover:opacity-100 hover:text-primary p-1 rounded flex-shrink-0" title="Delete">' +
        '<span class="material-symbols-outlined text-sm">delete</span>' +
      '</button>';
    div.querySelector(".del-btn").addEventListener("click", e => deleteSessionClick(s.id, e));
    container.appendChild(div);
  });
}

// ── Welcome screen ─────────────────────────────────────────────
function showWelcome() {
  document.getElementById("chatContainer").innerHTML =
    '<div class="flex justify-start">' +
      '<div class="ai-bubble p-6 rounded-2xl border border-white/5 max-w-2xl">' +
        '<div class="flex items-center gap-2 mb-3">' +
          '<span class="material-symbols-outlined text-primary text-lg">smart_toy</span>' +
          '<span class="text-xs font-bold text-primary uppercase tracking-widest">AI Assistant</span>' +
        '</div>' +
        '<p class="text-sm text-slate-300">Hey! I\'m your general AI assistant. Ask me anything — coding, writing, analysis, or just a conversation.</p>' +
        '<p class="text-xs text-slate-500 mt-2">&#128161; For questions about your <strong class="text-slate-400">uploaded documents</strong>, switch to <a href="/app" class="text-primary hover:underline">Document RAG</a>.</p>' +
      '</div>' +
    '</div>';
}

// ── Load sessions from backend ─────────────────────────────────
async function loadSessions() {
  try {
    const res = await fetch(API_BASE + "/general/sessions", { credentials: "include" });
    if (res.ok) {
      const data = await res.json();
      sessions = data.sessions || [];
    }
  } catch { sessions = []; }
  renderSessionList();
}

// ── Create new session ─────────────────────────────────────────
async function newSession() {
  try {
    const res = await fetch(API_BASE + "/general/sessions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ title: "New Chat" })
    });
    if (res.ok) {
      const data = await res.json();
      activeSessionId = data.session_id;
      sessions.unshift({ id: activeSessionId, title: "New Chat", created_at: new Date().toISOString(), updated_at: new Date().toISOString() });
      renderSessionList();
      showWelcome();
      document.getElementById("chatInput").focus();
      return;
    }
  } catch (e) { console.warn("newSession error:", e); }
  // Fallback: temp local id
  activeSessionId = "local_" + Date.now();
  sessions.unshift({ id: activeSessionId, title: "New Chat", created_at: new Date().toISOString(), updated_at: new Date().toISOString() });
  renderSessionList();
  showWelcome();
}

// ── Select session ─────────────────────────────────────────────
async function selectSession(id) {
  if (activeSessionId === id) return;
  activeSessionId = id;
  renderSessionList();
  const chat = document.getElementById("chatContainer");
  chat.innerHTML = '<div class="flex items-center justify-center py-12 text-slate-500 gap-2 text-sm"><div class="spinner" style="width:20px;height:20px;"></div>&nbsp;Loading...</div>';
  try {
    const res = await fetch(API_BASE + "/general/sessions/" + id + "/messages", { credentials: "include" });
    if (res.ok) {
      const data = await res.json();
      renderHistory(data.messages || []);
      return;
    }
  } catch {}
  renderHistory([]);
}

// ── Delete session ─────────────────────────────────────────────
async function deleteSessionClick(id, e) {
  e.stopPropagation();
  if (!confirm("Delete this chat?")) return;
  try { await fetch(API_BASE + "/general/sessions/" + id, { method: "DELETE", credentials: "include" }); } catch {}
  sessions = sessions.filter(s => s.id !== id);
  if (activeSessionId === id) {
    activeSessionId = sessions.length > 0 ? sessions[0].id : null;
    if (activeSessionId) { await selectSession(activeSessionId); }
    else { showWelcome(); }
  }
  renderSessionList();
}

// ── Render history ─────────────────────────────────────────────
function renderHistory(history) {
  const chat = document.getElementById("chatContainer");
  chat.innerHTML = "";
  if (!history || history.length === 0) { showWelcome(); return; }
  history.forEach(m => addBubble(m.content, m.role, false));
  setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
}

// ── Send message ───────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById("chatInput");
  const val = input.value.trim();
  if (!val) return;
  if (val.length > 4000) { addBubble("Message too long (max 4000 chars).", "assistant"); return; }

  addBubble(val, "user");
  input.value = "";
  autoResize(input);
  input.disabled = true;
  document.getElementById("sendBtn").disabled = true;
  const thinkId = showThinking();

  // Pass current session id (null if none yet — backend will create one)
  const sid = (activeSessionId && !activeSessionId.startsWith("local_")) ? activeSessionId : null;

  try {
    const res = await fetch(API_BASE + "/general/chat/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ question: val, session_id: sid })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      updateBubble(thinkId, err.detail || "Error " + res.status);
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "", fullAnswer = "", tokenUsage = {};

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n\n");
      buf = lines.pop() || "";
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        try {
          const d = JSON.parse(line.slice(6));
          if (d.type === "chunk") {
            fullAnswer += d.content;
            updateBubble(thinkId, fullAnswer);
          } else if (d.type === "done") {
            tokenUsage = d.token_usage || {};
            finalizeBubble(thinkId, fullAnswer, tokenUsage);
            // Sync session id returned by backend
            if (d.session_id) {
              const newId = d.session_id;
              if (newId !== activeSessionId) {
                const idx = sessions.findIndex(s => s.id === activeSessionId);
                if (idx !== -1) sessions[idx].id = newId;
                activeSessionId = newId;
              }
              // Update title in list after first message
              const idx = sessions.findIndex(s => s.id === activeSessionId);
              if (idx !== -1 && (sessions[idx].title === "New Chat" || !sessions[idx].title)) {
                sessions[idx].title = val.slice(0, 60) + (val.length > 60 ? "\u2026" : "");
                sessions[idx].updated_at = new Date().toISOString();
              }
              renderSessionList();
            }
          } else if (d.type === "error") {
            updateBubble(thinkId, d.content || "An error occurred.");
          }
        } catch {}
      }
    }
  } catch (e) {
    updateBubble(thinkId, "Connection error: " + e.message);
  } finally {
    input.disabled = false;
    document.getElementById("sendBtn").disabled = false;
    input.focus();
  }
}

// ── Bubble helpers ─────────────────────────────────────────────
function addBubble(text, role, scroll) {
  if (scroll === undefined) scroll = true;
  const chat = document.getElementById("chatContainer");
  const wrap = document.createElement("div");
  wrap.className = role === "user" ? "flex justify-end" : "flex justify-start";
  const id = "b" + Date.now() + Math.floor(Math.random() * 10000);
  wrap.id = id;
  const content = role === "assistant" ? renderMarkdown(text) : escapeHtml(text);
  wrap.innerHTML = '<div class="p-5 rounded-2xl text-sm max-w-[80%] ' +
    (role === "user" ? "bg-charcoal border border-white/10" : "ai-bubble border border-white/5") +
    '">' + content + '</div>';
  chat.appendChild(wrap);
  if (scroll) chat.scrollTop = chat.scrollHeight;
  return id;
}

function showThinking() {
  const chat = document.getElementById("chatContainer");
  const wrap = document.createElement("div");
  wrap.className = "flex justify-start";
  const id = "t" + Date.now();
  wrap.id = id;
  wrap.innerHTML = '<div class="p-5 rounded-2xl text-sm max-w-[80%] ai-bubble border border-white/5">' +
    '<div class="thinking-dots">' +
      '<div class="thinking-dot"></div>' +
      '<div class="thinking-dot"></div>' +
      '<div class="thinking-dot"></div>' +
    '</div></div>';
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return id;
}

// ── Smooth typing engine ──────────────────────────────────────
const _typers = {}; // id → { queue, raf, textNode }

function _ensureTyper(id) {
  if (_typers[id]) return _typers[id];
  const wrap = document.getElementById(id);
  if (!wrap) return null;
  const inner = wrap.querySelector("div");
  if (!inner) return null;
  inner.innerHTML = '';
  const textNode = document.createTextNode("");
  const cursor   = document.createElement("span");
  cursor.style.cssText = "display:inline-block;width:2px;height:.9em;background:#ff2e62;" +
    "margin-left:1px;vertical-align:middle;animation:blink .65s step-end infinite;";
  const block = document.createElement("span");
  block.style.cssText = "display:block;white-space:pre-wrap;line-height:1.7;font-size:.85rem;";
  block.appendChild(textNode);
  block.appendChild(cursor);
  inner.appendChild(block);
  const state = { queue: "", raf: null, textNode, cursor };
  _typers[id] = state;
  return state;
}

function _driveTyper(id) {
  const state = _typers[id];
  if (!state || state.raf) return;
  const container = document.getElementById("chatContainer");
  function tick() {
    if (!state.queue) { state.raf = null; return; }
    // 4 chars per frame ≈ smooth at 60fps but feels fast like GPT
    state.textNode.nodeValue += state.queue.slice(0, 4);
    state.queue = state.queue.slice(4);
    if (container) container.scrollTop = container.scrollHeight;
    state.raf = requestAnimationFrame(tick);
  }
  state.raf = requestAnimationFrame(tick);
}

function updateBubble(id, text) {
  const state = _ensureTyper(id);
  if (!state) return;
  // Only queue the new delta
  const rendered = state.textNode.nodeValue.length + state.queue.length;
  const delta = text.slice(rendered);
  if (delta) { state.queue += delta; _driveTyper(id); }
}

function finalizeBubble(id, text, tokenUsage) {
  const wrap = document.getElementById(id);
  if (!wrap) return;
  const inner = wrap.querySelector("div");
  if (!inner) return;
  // Cancel typer, flush instantly
  const state = _typers[id];
  if (state) {
    if (state.raf) { cancelAnimationFrame(state.raf); state.raf = null; }
    delete _typers[id];
  }
  // One-shot markdown render
  inner.innerHTML = renderMarkdown(text);
  if (tokenUsage && tokenUsage.total_tokens > 0) {
    const meta = document.createElement("div");
    meta.className = "mt-3 pt-3 border-t border-white/10 text-[10px] text-slate-500 flex items-center gap-4";
    meta.innerHTML = '<span class="flex items-center gap-1"><span class="material-symbols-outlined text-xs">memory</span>' +
      tokenUsage.total_tokens.toLocaleString() + ' tokens</span>';
    inner.appendChild(meta);
  }
}

// ── Utilities ─────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 180) + "px";
}

function escapeHtml(text) {
  const d = document.createElement("div");
  d.textContent = text;
  return d.innerHTML;
}

function renderMarkdown(text) {
  try { return marked.parse(text, { breaks: true, gfm: true }); }
  catch { return escapeHtml(text); }
}

async function logout() {
  try { await fetch(API_BASE + "/auth/logout", { method: "POST", credentials: "include" }); } catch {}
  window.location.href = "/";
}

document.getElementById("chatInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Init ──────────────────────────────────────────────────────
window.onload = async function() {
  try {
    const res = await fetch(API_BASE + "/auth/check", { credentials: "include" });
    const data = await res.json();
    if (!data.authenticated) { window.location.href = "/login"; return; }
    document.getElementById("usernameText").textContent = data.username || "—";
    document.body.style.visibility = "visible";
  } catch { window.location.href = "/login"; return; }

  await loadSessions();

  if (sessions.length > 0) {
    activeSessionId = sessions[0].id;
    renderSessionList();
    await selectSession(activeSessionId);
  } else {
    showWelcome();
  }
};
</script>
</body>
</html>
