<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAGCORE — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#ff2e62","matte-black":"#0A0A0A",charcoal:"#111111"},fontFamily:{display:["Space Grotesk","sans-serif"]}}}}</script>
<style>
*{box-sizing:border-box;}
body{background:#000;color:#f1f5f9;font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}

/* Input — hardened against browser/Tailwind resets */
.field{
  width:100% !important;
  background:#0d0d0d !important;
  background-color:#0d0d0d !important;
  border:1px solid rgba(255,255,255,.14) !important;
  border-radius:10px;
  padding:11px 14px;
  font-size:.85rem;
  color:#f1f5f9 !important;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
  font-family:'Space Grotesk',sans-serif;
  color-scheme:dark;
  appearance:none;
  -webkit-appearance:none;
}
.field::placeholder{color:#4b5563 !important;opacity:1;}
.field:focus{
  border-color:rgba(255,46,98,.6) !important;
  box-shadow:0 0 0 3px rgba(255,46,98,.1);
  background:#0d0d0d !important;
  background-color:#0d0d0d !important;
}
.field.err{border-color:rgba(239,68,68,.6) !important;box-shadow:0 0 0 3px rgba(239,68,68,.08);}
/* Kill browser autofill white flash */
.field:-webkit-autofill,
.field:-webkit-autofill:hover,
.field:-webkit-autofill:focus,
.field:-webkit-autofill:active{
  -webkit-text-fill-color:#f1f5f9 !important;
  -webkit-box-shadow:0 0 0 1000px #0d0d0d inset !important;
  box-shadow:0 0 0 1000px #0d0d0d inset !important;
  transition:background-color 9999s ease 0s;
  caret-color:#f1f5f9;
}

/* Button states */
.btn{width:100%;border:none;border-radius:10px;padding:12px;font-size:.85rem;font-weight:700;
  cursor:pointer;font-family:'Space Grotesk',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;position:relative;overflow:hidden;}
.btn-default{background:#ff2e62;color:#fff;}
.btn-default:hover:not(:disabled){background:#ff1a52;transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,46,98,.35);}
.btn-loading{background:#1e293b;color:#64748b;cursor:not-allowed;}
.btn-success{background:#10b981;color:#fff;cursor:default;}
.btn-success:hover{transform:none;box-shadow:none;}

/* Spinner */
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.15);
  border-top-color:#94a3b8;border-radius:50%;animation:rot .7s linear infinite;flex-shrink:0;}
@keyframes rot{to{transform:rotate(360deg);}}

/* Success check */
.check-circle{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.check-circle .material-symbols-outlined{font-size:14px;}

/* Card */
.card{background:#0a0a0a;border:1px solid rgba(255,46,98,.25);border-radius:20px;padding:36px;
  box-shadow:0 0 40px rgba(255,46,98,.07);width:100%;max-width:420px;}

/* Error / success messages */
.msg{border-radius:9px;padding:10px 14px;font-size:.78rem;line-height:1.5;display:flex;align-items:flex-start;gap:8px;}
.msg-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;}
.msg-ok {background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#6ee7b7;}

/* Fade in animation */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.card{animation:fadeUp .4s ease-out;}

/* Progress bar (for success redirect) */
.progress-bar{height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;margin-top:10px;}
.progress-fill{height:100%;background:#10b981;border-radius:1px;width:0%;transition:width 1.2s linear;}
.admin-overlay{
  position:fixed;inset:0;z-index:9999;
  background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;
}
.admin-overlay.show{opacity:1;pointer-events:all;}
.shield-pulse{
  width:72px;height:72px;border-radius:20px;
  background:rgba(255,46,98,.15);border:2px solid rgba(255,46,98,.4);
  display:flex;align-items:center;justify-content:center;
  animation:shieldPop .4s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes shieldPop{
  0%{transform:scale(.5);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
.admin-scan{
  width:72px;height:2px;background:linear-gradient(90deg,transparent,#ff2e62,transparent);
  animation:scan 1s ease-in-out infinite;
}
@keyframes scan{0%{transform:translateY(-30px);}100%{transform:translateY(30px);}}
.admin-text-anim{
  animation:fadeSlideUp .4s .2s ease-out both;
}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- Admin redirect overlay -->
<div id="adminOverlay" class="admin-overlay">
  <div style="position:relative;display:flex;align-items:center;justify-content:center;">
    <div class="shield-pulse">
      <span class="material-symbols-outlined" style="font-size:34px;color:#ff2e62;">shield</span>
    </div>
    <div class="admin-scan" style="position:absolute;"></div>
  </div>
  <div class="admin-text-anim" style="text-align:center;">
    <p style="font-size:1rem;font-weight:800;color:#f1f5f9;letter-spacing:-.01em;">Admin Access Granted</p>
    <p style="font-size:.75rem;color:#475569;margin-top:4px;">Redirecting to Admin Panel…</p>
  </div>
</div>
<div style="width:100%;max-width:420px;padding:20px;">

  <!-- Logo -->
  <div style="text-align:center;margin-bottom:28px;">
    <div style="display:inline-flex;align-items:center;gap:8px;margin-bottom:10px;">
      <div style="width:10px;height:10px;border-radius:50%;background:#ff2e62;animation:rot 3s linear infinite;"></div>
      <span style="font-size:1.25rem;font-weight:800;letter-spacing:-.02em;text-transform:uppercase;">
        RAG<span style="color:#ff2e62;">CORE</span>
      </span>
    </div>
    <p style="font-size:.78rem;color:#475569;">Sign in to your account</p>
  </div>

  <div class="card">
    <!-- Error message -->
    <div id="errMsg" class="msg msg-err hidden" style="margin-bottom:18px;">
      <span class="material-symbols-outlined" style="font-size:16px;flex-shrink:0;margin-top:1px;">error</span>
      <span id="errText"></span>
    </div>

    <!-- Success message -->
    <div id="okMsg" class="msg msg-ok hidden" style="margin-bottom:18px;">
      <span class="material-symbols-outlined" style="font-size:16px;flex-shrink:0;margin-top:1px;">check_circle</span>
      <div style="flex:1;">
        <span id="okText">Login successful! Redirecting…</span>
        <div class="progress-bar" style="margin-top:8px;"><div id="progressFill" class="progress-fill"></div></div>
      </div>
    </div>

    <!-- Form -->
    <form id="loginForm" style="display:flex;flex-direction:column;gap:18px;" novalidate>
      <div>
        <label style="display:block;font-size:.65rem;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px;">Username</label>
        <input id="username" type="text" class="field" placeholder="Enter your username"
          autocomplete="username" autocapitalize="none" spellcheck="false"/>
      </div>
      <div>
        <label style="display:block;font-size:.65rem;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px;">Password</label>
        <input id="password" type="password" class="field" placeholder="Enter your password"
          autocomplete="current-password"/>
      </div>

      <!-- Submit button -->
      <button type="submit" id="submitBtn" class="btn btn-default" style="margin-top:4px;">
        <span id="btnIcon" class="material-symbols-outlined" style="font-size:18px;">login</span>
        <span id="btnText">Sign In</span>
      </button>
    </form>
  </div>

  <!-- Links -->
  <div style="text-align:center;margin-top:18px;display:flex;flex-direction:column;gap:6px;">
    <p style="font-size:.72rem;color:#475569;">No account? <a href="/register" style="color:#ff2e62;text-decoration:none;font-weight:600;">Create one free</a></p>
    <a href="/" style="font-size:.68rem;color:#334155;text-decoration:none;display:inline-flex;align-items:center;gap:4px;justify-content:center;margin-top:4px;transition:color .15s;"
      onmouseover="this.style.color='#ff2e62'" onmouseout="this.style.color='#334155'">
      <span class="material-symbols-outlined" style="font-size:14px;">arrow_back</span>Back to home
    </a>
  </div>
</div>

<script>
const form   = document.getElementById("loginForm");
const errMsg = document.getElementById("errMsg");
const errTxt = document.getElementById("errText");
const okMsg  = document.getElementById("okMsg");
const okTxt  = document.getElementById("okText");
const btn    = document.getElementById("submitBtn");
const btnIcon= document.getElementById("btnIcon");
const btnTxt = document.getElementById("btnText");

function setState(state, msg) {
  // state: idle | loading | success | error
  errMsg.classList.add("hidden");
  okMsg.classList.add("hidden");

  if (state === "loading") {
    btn.className = "btn btn-loading";
    btn.disabled = true;
    btn.innerHTML = '<div class="spin"></div><span>Signing in…</span>';
  } else if (state === "success") {
    btn.className = "btn btn-success";
    btn.disabled = true;
    btn.innerHTML = '<div class="check-circle"><span class="material-symbols-outlined" style="font-size:14px;">check</span></div><span>' + (msg || "Success!") + '</span>';
    okTxt.textContent = "Login successful! Redirecting…";
    okMsg.classList.remove("hidden");
    // Animate progress bar
    setTimeout(() => {
      document.getElementById("progressFill").style.width = "100%";
    }, 50);
  } else if (state === "error") {
    btn.className = "btn btn-default";
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;">login</span><span>Sign In</span>';
    errTxt.textContent = msg || "Invalid credentials";
    errMsg.classList.remove("hidden");
    // Shake the card
    const card = document.querySelector(".card");
    card.style.animation = "none";
    card.offsetHeight; // reflow
    card.style.animation = "shake .35s ease-out";
  } else {
    btn.className = "btn btn-default";
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;">login</span><span>Sign In</span>';
  }
}

// Add shake keyframe dynamically
const style = document.createElement("style");
style.textContent = "@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}";
document.head.appendChild(style);

form.onsubmit = async (e) => {
  e.preventDefault();
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  // Basic client-side validation
  if (!username) {
    document.getElementById("username").classList.add("err");
    setState("error", "Username is required.");
    return;
  }
  if (!password) {
    document.getElementById("password").classList.add("err");
    setState("error", "Password is required.");
    return;
  }
  document.getElementById("username").classList.remove("err");
  document.getElementById("password").classList.remove("err");

  setState("loading");

  try {
    const res = await fetch("/auth/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      credentials: "include",
      body: JSON.stringify({username, password})
    });

    let data;
    try { data = await res.json(); } catch { data = {}; }

    if (!res.ok) {
      setState("error", data.detail || data.message || "Invalid credentials");
      return;
    }

    if (data.refresh_token) {
      sessionStorage.setItem("refresh_token", data.refresh_token);
    }

    // Check if user is admin — redirect to admin panel with special animation
    const role = (data.user_info || {}).role || "user";
    if (role === "admin") {
      setState("success", "Welcome, Admin!");
      setTimeout(() => {
        document.getElementById("adminOverlay").classList.add("show");
        setTimeout(() => { location.href = "/admin-panel"; }, 1800);
      }, 400);
    } else {
      setState("success");
      setTimeout(() => { location.href = "/app"; }, 1300);
    }

  } catch(err) {
    const msg = err.message && err.message.includes("fetch")
      ? "Cannot reach server. Is it running on port 8000?"
      : "Error: " + err.message;
    setState("error", msg);
  }
};

// Remove err class on input
["username","password"].forEach(id => {
  document.getElementById(id).addEventListener("input", () => {
    document.getElementById(id).classList.remove("err");
  });
});

// Enter key on username moves to password
document.getElementById("username").addEventListener("keydown", e => {
  if (e.key === "Enter") { e.preventDefault(); document.getElementById("password").focus(); }
});
</script>
</body>
</html>
