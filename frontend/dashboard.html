<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAGCORE — Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#ff2e62","matte-black":"#0A0A0A"}}}}</script>
<style>
*{box-sizing:border-box;}
body{background:#000;color:#f1f5f9;font-family:'Space Grotesk',sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px;}
.stat-card{background:#0a0a0a;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px 24px;transition:border-color .2s;}
.stat-card:hover{border-color:rgba(255,46,98,.2);}
.nav-link{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:.72rem;font-weight:600;color:#64748b;text-decoration:none;transition:all .15s;}
.nav-link:hover{color:#f1f5f9;background:rgba(255,255,255,.05);}
.nav-link.active{color:#ff2e62;background:rgba(255,46,98,.1);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:.62rem;font-weight:700;}
.badge-green{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#10b981;}
.badge-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;}
.badge-yellow{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#f59e0b;}
.badge-blue{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:#818cf8;}
.table-row{display:grid;border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s;}
.table-row:hover{background:rgba(255,255,255,.02);}
.section-title{font-size:.6rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#334155;margin-bottom:12px;}
</style>
</head>
<body class="min-h-screen">

<!-- ── Top nav ──────────────────────────────────────────────── -->
<header class="h-14 border-b border-white/5 bg-[#0A0A0A] flex items-center justify-between px-6 sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <a href="/app" class="flex items-center gap-2">
      <div class="w-2.5 h-2.5 bg-primary rounded-full animate-pulse"></div>
      <span class="text-base font-bold tracking-tighter uppercase">RAG<span class="text-primary font-black">CORE</span></span>
    </a>
    <div class="flex items-center bg-white/5 border border-white/10 rounded-xl p-1 gap-0.5">
      <a href="/app"        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all"><span class="material-symbols-outlined text-sm">folder_open</span><span class="hidden sm:inline">RAG</span></a>
      <a href="/ai-chat"    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all"><span class="material-symbols-outlined text-sm">smart_toy</span><span class="hidden sm:inline">AI Chat</span></a>
      <a href="/dashboard"  class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold bg-primary/20 text-primary border border-primary/30"><span class="material-symbols-outlined text-sm">dashboard</span><span class="hidden sm:inline">Dashboard</span></a>
      <a href="/monitoring" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all"><span class="material-symbols-outlined text-sm">monitor_heart</span><span class="hidden sm:inline">Monitor</span></a>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <a href="/profile" class="text-[10px] font-bold bg-white/5 border border-white/10 px-3 py-1.5 rounded-full text-slate-400 hover:text-primary hover:border-primary/40 transition-all flex items-center gap-1.5">
      <span class="material-symbols-outlined text-sm">account_circle</span><span id="usernameDisplay">—</span>
    </a>
    <a href="/settings" class="text-[10px] font-bold bg-white/5 border border-white/10 px-3 py-1.5 rounded-full text-slate-400 hover:text-primary transition-all flex items-center gap-1.5">
      <span class="material-symbols-outlined text-sm">settings</span>
    </a>
    <button onclick="doLogout()" class="text-[10px] font-bold bg-white/5 border border-white/10 px-3 py-1.5 rounded-full text-slate-400 hover:text-primary hover:border-primary/40 transition-all flex items-center gap-1.5">
      <span class="material-symbols-outlined text-sm">logout</span>
    </button>
  </div>
</header>

<!-- ── Body ─────────────────────────────────────────────────── -->
<div class="max-w-6xl mx-auto px-6 py-8">

  <!-- Page title -->
  <div class="mb-8">
    <h1 class="text-2xl font-black mb-1">Dashboard</h1>
    <p class="text-sm text-slate-500">Overview of your workspaces, documents, and query activity.</p>
  </div>

  <!-- ── Stat cards ── -->
  <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <!-- filled by JS -->
    <div class="stat-card col-span-2 md:col-span-4 flex items-center justify-center py-8">
      <div class="w-5 h-5 border-2 border-white/10 border-t-primary rounded-full animate-spin mr-3"></div>
      <span class="text-sm text-slate-500">Loading stats…</span>
    </div>
  </div>

  <div class="grid md:grid-cols-3 gap-6">

    <!-- ── Recent queries ── -->
    <div class="md:col-span-2">
      <p class="section-title">Recent Queries</p>
      <div class="bg-[#0a0a0a] border border-white/7 rounded-2xl overflow-hidden">
        <!-- Header row -->
        <div class="table-row grid-cols-[1fr_100px_70px_80px_60px] px-4 py-2 border-b border-white/8" style="grid-template-columns:1fr 100px 70px 80px 60px;">
          <span class="text-[10px] font-800 uppercase tracking-wider text-slate-600">Question</span>
          <span class="text-[10px] font-800 uppercase tracking-wider text-slate-600">Workspace</span>
          <span class="text-[10px] font-800 uppercase tracking-wider text-slate-600">Latency</span>
          <span class="text-[10px] font-800 uppercase tracking-wider text-slate-600">Tokens</span>
          <span class="text-[10px] font-800 uppercase tracking-wider text-slate-600">Status</span>
        </div>
        <div id="queryLog" style="max-height:380px;overflow-y:auto;">
          <div class="flex items-center justify-center py-10 text-slate-600 text-sm">Loading…</div>
        </div>
      </div>
    </div>

    <!-- ── Workspace list ── -->
    <div>
      <p class="section-title">Workspaces</p>
      <div id="wsList" class="space-y-2">
        <div class="flex items-center justify-center py-8 text-slate-600 text-sm">Loading…</div>
      </div>
    </div>

  </div>
</div>

<script>
async function doLogout() {
  try { await fetch("/auth/logout",{method:"POST",credentials:"include"}); } catch {}
  location.href = "/";
}

function esc(s) {
  const d = document.createElement("div"); d.textContent = String(s||""); return d.innerHTML;
}

function relTime(iso) {
  if (!iso) return "";
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  const h = Math.floor(m/60);
  if (h < 24) return h + "h ago";
  return Math.floor(h/24) + "d ago";
}

function statCard(icon, label, value, sub, color) {
  return `<div class="stat-card">
    <div style="width:36px;height:36px;border-radius:10px;background:${color}18;border:1px solid ${color}30;display:flex;align-items:center;justify-content:center;margin-bottom:12px;">
      <span class="material-symbols-outlined" style="font-size:18px;color:${color};">${icon}</span>
    </div>
    <div style="font-size:1.6rem;font-weight:800;color:#f1f5f9;line-height:1;">${esc(String(value))}</div>
    <div style="font-size:.72rem;font-weight:600;color:#475569;margin-top:4px;">${esc(label)}</div>
    ${sub ? `<div style="font-size:.62rem;color:#334155;margin-top:2px;">${esc(sub)}</div>` : ""}
  </div>`;
}

async function loadStats() {
  try {
    const r = await fetch("/dashboard/stats", {credentials:"include"});
    if (!r.ok) return;
    const d = await r.json();
    document.getElementById("statsGrid").innerHTML =
      statCard("workspaces",    "Workspaces",       d.workspaces,       null,                    "#ff2e62") +
      statCard("description",   "Documents",        d.documents,        d.chunks.toLocaleString() + " chunks", "#3b82f6") +
      statCard("chat_bubble",   "Chats",            d.chats,            null,                    "#818cf8") +
      statCard("query_stats",   "Queries",          d.queries,          d.avg_latency_ms + "ms avg", "#10b981") +
      statCard("thumb_up",      "Positive",         d.thumbs_up,        "feedback",              "#10b981") +
      statCard("thumb_down",    "Negative",         d.thumbs_down,      "feedback",              "#ef4444") +
      statCard("database",      "Storage",          d.storage_fmt,      null,                    "#f59e0b") +
      statCard("memory",        "Indexed Chunks",   d.chunks.toLocaleString(), "across all docs", "#06b6d4");
  } catch {}
}

async function loadQueries() {
  try {
    const r = await fetch("/dashboard/queries?limit=50", {credentials:"include"});
    const d = await r.json();
    const rows = d.queries || [];
    const el = document.getElementById("queryLog");
    if (!rows.length) { el.innerHTML = '<div class="text-center py-8 text-slate-600 text-sm">No queries yet</div>'; return; }
    el.innerHTML = rows.map(q => {
      const status = q.status === "ERROR"
        ? '<span class="badge badge-red">Error</span>'
        : '<span class="badge badge-green">OK</span>';
      const fb = q.feedback === "up" ? "👍" : q.feedback === "down" ? "👎" : "—";
      return `<div class="table-row px-4 py-2.5" style="display:grid;grid-template-columns:1fr 100px 70px 80px 60px;align-items:center;gap:8px;">
        <div style="min-width:0;">
          <p style="font-size:.72rem;color:#cbd5e1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(q.question)}">${esc(q.question)}</p>
          <p style="font-size:.6rem;color:#334155;margin-top:1px;">${relTime(q.created_at)}</p>
        </div>
        <span style="font-size:.65rem;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(q.workspace_slug||"—")}</span>
        <span style="font-size:.7rem;color:#64748b;">${q.latency_ms ? q.latency_ms + "ms" : "—"}</span>
        <span style="font-size:.7rem;color:#64748b;">${q.total_tokens ? q.total_tokens.toLocaleString() : "—"}</span>
        <div style="display:flex;align-items:center;gap:4px;">${status}<span style="font-size:.75rem;">${fb}</span></div>
      </div>`;
    }).join("");
  } catch {}
}

async function loadWorkspaces() {
  try {
    const r = await fetch("/workspace/list", {credentials:"include"});
    const d = await r.json();
    const list = d.workspaces || [];
    const el = document.getElementById("wsList");
    if (!list.length) { el.innerHTML = '<div class="text-sm text-slate-600 text-center py-4">No workspaces</div>'; return; }
    el.innerHTML = list.map(ws => `
      <a href="/app" onclick="sessionStorage.setItem('ragcore_activeWS','${esc(ws.slug)}');return true;"
        class="block bg-[#0a0a0a] border border-white/7 rounded-xl p-4 hover:border-primary/25 transition-all">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:32px;height:32px;border-radius:9px;background:rgba(255,46,98,.1);border:1px solid rgba(255,46,98,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.75rem;font-weight:800;color:#ff2e62;">${esc((ws.name||"?")[0].toUpperCase())}</div>
          <div style="flex:1;min-width:0;">
            <p style="font-size:.8rem;font-weight:600;color:#f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(ws.name)}</p>
            <p style="font-size:.62rem;color:#334155;">${esc(ws.slug)}</p>
          </div>
          ${ws.message_count > 0 ? `<span class="badge badge-blue">${ws.message_count}</span>` : ""}
        </div>
        ${ws.last_message ? `<p style="font-size:.65rem;color:#334155;margin-top:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(ws.last_message)}</p>` : ""}
      </a>`).join("");
  } catch {}
}

async function loadUsername() {
  try {
    const r = await fetch("/auth/user", {credentials:"include"});
    if (r.ok) { const d = await r.json(); document.getElementById("usernameDisplay").textContent = d.username||"—"; }
    else { location.href = "/login"; }
  } catch { location.href = "/login"; }
}

window.onload = async () => {
  await loadUsername();
  await Promise.all([loadStats(), loadQueries(), loadWorkspaces()]);
};
</script>
</body>
</html>
