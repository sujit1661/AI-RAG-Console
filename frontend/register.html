<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAGCORE — Register</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#ff2e62","matte-black":"#0A0A0A",charcoal:"#111111"},fontFamily:{display:["Space Grotesk","sans-serif"]}}}}</script>
<style>
*{box-sizing:border-box;}
body{background:#000;color:#f1f5f9;font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

.field{
  width:100% !important;
  background:#0d0d0d !important;
  background-color:#0d0d0d !important;
  border:1px solid rgba(255,255,255,.14) !important;
  border-radius:10px;
  padding:11px 14px;
  font-size:.85rem;
  color:#f1f5f9 !important;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
  font-family:'Space Grotesk',sans-serif;
  color-scheme:dark;
  appearance:none;
  -webkit-appearance:none;
}
.field::placeholder{color:#4b5563 !important;opacity:1;}
.field:focus{
  border-color:rgba(255,46,98,.6) !important;
  box-shadow:0 0 0 3px rgba(255,46,98,.1);
  background:#0d0d0d !important;
  background-color:#0d0d0d !important;
}
.field.err{border-color:rgba(239,68,68,.6) !important;box-shadow:0 0 0 3px rgba(239,68,68,.08);}
.field.ok {border-color:rgba(16,185,129,.5) !important;box-shadow:0 0 0 3px rgba(16,185,129,.07);}
.field:-webkit-autofill,
.field:-webkit-autofill:hover,
.field:-webkit-autofill:focus,
.field:-webkit-autofill:active{
  -webkit-text-fill-color:#f1f5f9 !important;
  -webkit-box-shadow:0 0 0 1000px #0d0d0d inset !important;
  box-shadow:0 0 0 1000px #0d0d0d inset !important;
  transition:background-color 9999s ease 0s;
  caret-color:#f1f5f9;
}
.field-hint{font-size:.62rem;margin-top:5px;color:#334155;}
.field-hint.err{color:#f87171;}
.field-hint.ok {color:#6ee7b7;}

.btn{width:100%;border:none;border-radius:10px;padding:12px;font-size:.85rem;font-weight:700;
  cursor:pointer;font-family:'Space Grotesk',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.btn-default{background:#ff2e62;color:#fff;}
.btn-default:hover:not(:disabled){background:#ff1a52;transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,46,98,.35);}
.btn-loading{background:#1e293b;color:#64748b;cursor:not-allowed;}
.btn-success{background:#10b981;color:#fff;cursor:default;}

.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.15);
  border-top-color:#94a3b8;border-radius:50%;animation:rot .7s linear infinite;flex-shrink:0;}
@keyframes rot{to{transform:rotate(360deg);}}
.check-circle{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.card{background:#0a0a0a;border:1px solid rgba(255,46,98,.25);border-radius:20px;padding:36px;
  box-shadow:0 0 40px rgba(255,46,98,.07);width:100%;max-width:440px;
  animation:fadeUp .4s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}

.msg{border-radius:9px;padding:10px 14px;font-size:.78rem;line-height:1.5;display:flex;align-items:flex-start;gap:8px;}
.msg-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;}
.msg-ok {background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#6ee7b7;}
.progress-bar{height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;background:#10b981;border-radius:1px;width:0%;transition:width 1.2s linear;}

/* Password strength bar */
#strengthBar{height:3px;border-radius:2px;transition:width .3s,background .3s;width:0%;}
</style>
</head>
<body>
<div style="width:100%;max-width:440px;">

  <!-- Logo -->
  <div style="text-align:center;margin-bottom:28px;">
    <div style="display:inline-flex;align-items:center;gap:8px;margin-bottom:10px;">
      <div style="width:10px;height:10px;border-radius:50%;background:#ff2e62;animation:rot 3s linear infinite;"></div>
      <span style="font-size:1.25rem;font-weight:800;letter-spacing:-.02em;text-transform:uppercase;">
        RAG<span style="color:#ff2e62;">CORE</span>
      </span>
    </div>
    <p style="font-size:.78rem;color:#475569;">Create your free account</p>
  </div>

  <div class="card">
    <div id="errMsg" class="msg msg-err hidden" style="margin-bottom:18px;">
      <span class="material-symbols-outlined" style="font-size:16px;flex-shrink:0;margin-top:1px;">error</span>
      <span id="errText"></span>
    </div>
    <div id="okMsg" class="msg msg-ok hidden" style="margin-bottom:18px;">
      <span class="material-symbols-outlined" style="font-size:16px;flex-shrink:0;margin-top:1px;">check_circle</span>
      <div style="flex:1;">
        <span>Account created! Redirecting to app…</span>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
      </div>
    </div>

    <form id="regForm" style="display:flex;flex-direction:column;gap:16px;" novalidate>
      <!-- Username -->
      <div>
        <label style="display:block;font-size:.65rem;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px;">
          Username <span style="color:#ff2e62;">*</span>
        </label>
        <input id="username" type="text" class="field" placeholder="letters, numbers, underscores (min 3)"
          autocomplete="username" autocapitalize="none" spellcheck="false"
          oninput="validateUsername()"/>
        <p id="usernameHint" class="field-hint">At least 3 characters. Letters, numbers, underscores only.</p>
      </div>

      <!-- Email -->
      <div>
        <label style="display:block;font-size:.65rem;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px;">
          Email <span style="color:#334155;font-weight:400;">(optional)</span>
        </label>
        <input id="email" type="email" class="field" placeholder="you@example.com" autocomplete="email"/>
      </div>

      <!-- Password -->
      <div>
        <label style="display:block;font-size:.65rem;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px;">
          Password <span style="color:#ff2e62;">*</span>
        </label>
        <input id="password" type="password" class="field" placeholder="at least 6 characters"
          autocomplete="new-password" oninput="updateStrength()"/>
        <!-- Strength bar -->
        <div style="background:rgba(255,255,255,.06);border-radius:2px;height:3px;margin-top:6px;overflow:hidden;">
          <div id="strengthBar"></div>
        </div>
        <p id="strengthLabel" class="field-hint"></p>
      </div>

      <!-- Confirm password -->
      <div>
        <label style="display:block;font-size:.65rem;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px;">
          Confirm Password <span style="color:#ff2e62;">*</span>
        </label>
        <input id="confirmPw" type="password" class="field" placeholder="re-enter password"
          autocomplete="new-password" oninput="validateConfirm()"/>
        <p id="confirmHint" class="field-hint"></p>
      </div>

      <button type="submit" id="submitBtn" class="btn btn-default" style="margin-top:4px;">
        <span class="material-symbols-outlined" style="font-size:18px;">person_add</span>
        <span>Create Account</span>
      </button>
    </form>
  </div>

  <div style="text-align:center;margin-top:18px;display:flex;flex-direction:column;gap:6px;">
    <p style="font-size:.72rem;color:#475569;">Already have an account? <a href="/login" style="color:#ff2e62;text-decoration:none;font-weight:600;">Sign in</a></p>
    <a href="/" style="font-size:.68rem;color:#334155;text-decoration:none;display:inline-flex;align-items:center;gap:4px;justify-content:center;margin-top:4px;transition:color .15s;"
      onmouseover="this.style.color='#ff2e62'" onmouseout="this.style.color='#334155'">
      <span class="material-symbols-outlined" style="font-size:14px;">arrow_back</span>Back to home
    </a>
  </div>
</div>

<script>
const errMsg = document.getElementById("errMsg");
const errTxt = document.getElementById("errText");
const okMsg  = document.getElementById("okMsg");
const btn    = document.getElementById("submitBtn");

function setState(state, msg) {
  errMsg.classList.add("hidden");
  okMsg.classList.add("hidden");
  if (state === "loading") {
    btn.className = "btn btn-loading";
    btn.disabled = true;
    btn.innerHTML = '<div class="spin"></div><span>Creating account…</span>';
  } else if (state === "success") {
    btn.className = "btn btn-success";
    btn.disabled = true;
    btn.innerHTML = '<div class="check-circle"><span class="material-symbols-outlined" style="font-size:14px;">check</span></div><span>Account created!</span>';
    okMsg.classList.remove("hidden");
    setTimeout(() => { document.getElementById("progressFill").style.width = "100%"; }, 50);
  } else if (state === "error") {
    btn.className = "btn btn-default";
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;">person_add</span><span>Create Account</span>';
    errTxt.textContent = msg || "Registration failed";
    errMsg.classList.remove("hidden");
    const card = document.querySelector(".card");
    card.style.animation = "none"; card.offsetHeight;
    card.style.animation = "shake .35s ease-out";
  } else {
    btn.className = "btn btn-default";
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;">person_add</span><span>Create Account</span>';
  }
}

function validateUsername() {
  const val = document.getElementById("username").value;
  const hint = document.getElementById("usernameHint");
  const field = document.getElementById("username");
  if (!val) { field.classList.remove("ok","err"); hint.className = "field-hint"; hint.textContent = "At least 3 characters. Letters, numbers, underscores only."; return false; }
  if (val.length < 3 || !/^[a-zA-Z0-9_]+$/.test(val)) {
    field.classList.add("err"); field.classList.remove("ok");
    hint.className = "field-hint err"; hint.textContent = "Min 3 chars. Letters, numbers, underscores only."; return false;
  }
  field.classList.add("ok"); field.classList.remove("err");
  hint.className = "field-hint ok"; hint.textContent = "✓ Looks good";
  return true;
}

function updateStrength() {
  const pw = document.getElementById("password").value;
  const bar = document.getElementById("strengthBar");
  const lbl = document.getElementById("strengthLabel");
  const field = document.getElementById("password");
  if (!pw) { bar.style.width="0%"; lbl.textContent=""; field.classList.remove("ok","err"); return; }
  let score = 0;
  if (pw.length >= 6)  score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    {w:"20%",  bg:"#ef4444", txt:"Weak",   cls:"err"},
    {w:"40%",  bg:"#f97316", txt:"Fair",   cls:"err"},
    {w:"60%",  bg:"#f59e0b", txt:"OK",     cls:""},
    {w:"80%",  bg:"#84cc16", txt:"Good",   cls:"ok"},
    {w:"100%", bg:"#10b981", txt:"Strong", cls:"ok"},
  ];
  const lvl = levels[Math.min(score-1, 4)] || levels[0];
  bar.style.width = lvl.w; bar.style.background = lvl.bg;
  lbl.className = "field-hint " + lvl.cls;
  lbl.textContent = lvl.txt;
  if (score >= 2) { field.classList.add("ok"); field.classList.remove("err"); }
  else            { field.classList.add("err"); field.classList.remove("ok"); }
  validateConfirm();
}

function validateConfirm() {
  const pw = document.getElementById("password").value;
  const cp = document.getElementById("confirmPw").value;
  const hint = document.getElementById("confirmHint");
  const field = document.getElementById("confirmPw");
  if (!cp) { field.classList.remove("ok","err"); hint.className="field-hint"; hint.textContent=""; return; }
  if (pw === cp) {
    field.classList.add("ok"); field.classList.remove("err");
    hint.className = "field-hint ok"; hint.textContent = "✓ Passwords match";
  } else {
    field.classList.add("err"); field.classList.remove("ok");
    hint.className = "field-hint err"; hint.textContent = "Passwords do not match";
  }
}

document.getElementById("regForm").onsubmit = async (e) => {
  e.preventDefault();
  const username  = document.getElementById("username").value.trim();
  const email     = document.getElementById("email").value.trim();
  const password  = document.getElementById("password").value;
  const confirmPw = document.getElementById("confirmPw").value;

  // Validate
  if (!validateUsername()) { setState("error", "Please fix the username field."); return; }
  if (password.length < 6) { setState("error", "Password must be at least 6 characters."); return; }
  if (password !== confirmPw) { setState("error", "Passwords do not match."); return; }

  setState("loading");

  try {
    const res = await fetch("/auth/register", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      credentials: "include",
      body: JSON.stringify({username, password, email})
    });

    let data;
    try { data = await res.json(); } catch { data = {}; }

    if (!res.ok) {
      setState("error", data.detail || data.message || "Registration failed");
      return;
    }

    if (data.success) {
      if (data.refresh_token) sessionStorage.setItem("refresh_token", data.refresh_token);
      setState("success");
      setTimeout(() => { location.href = "/app"; }, 1400);
    } else {
      setState("error", data.detail || "Registration failed");
    }
  } catch(err) {
    const msg = err.message && err.message.includes("fetch")
      ? "Cannot reach server. Is it running on port 8000?"
      : "Error: " + err.message;
    setState("error", msg);
  }
};
</script>
</body>
</html>
