<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register - RAG Console</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

<script>
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: { primary: "#ff2e62", "matte-black": "#0A0A0A", charcoal: "#111111" },
            fontFamily: { display: ["Space Grotesk", "sans-serif"] }
        }
    }
}
</script>

<style>
body { background: #000; color: #f1f5f9; font-family: 'Space Grotesk', sans-serif; }
.neon-border { border: 1px solid rgba(255,46,98,0.3); box-shadow: 0 0 15px rgba(255,46,98,0.1); }
.spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: #ff2e62;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body class="h-screen flex items-center justify-center bg-black">
<div class="w-full max-w-md p-8">
    <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-2 mb-4">
            <div class="w-3 h-3 bg-primary rounded-full animate-pulse"></div>
            <h1 class="text-2xl font-bold tracking-tighter uppercase">RAG<span class="text-primary font-black">CORE</span></h1>
        </div>
        <p class="text-slate-500 text-sm">Create your account</p>
    </div>

    <form id="registerForm" class="bg-matte-black neon-border rounded-2xl p-8 space-y-6">
        <div id="errorMsg" class="hidden bg-red-500/20 border border-red-500/50 text-red-400 text-sm p-3 rounded-lg"></div>
        <div id="successMsg" class="hidden bg-green-500/20 border border-green-500/50 text-green-400 text-sm p-3 rounded-lg"></div>
        
        <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Username</label>
            <input 
                type="text" 
                id="username" 
                required
                minlength="3"
                pattern="[a-zA-Z0-9_]+"
                class="w-full bg-charcoal border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                placeholder="At least 3 characters, letters, numbers, underscores"
                autocomplete="username"
            />
            <p class="text-[9px] text-slate-600 mt-1">Letters, numbers, and underscores only</p>
        </div>

        <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Email (Optional)</label>
            <input 
                type="email" 
                id="email" 
                class="w-full bg-charcoal border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                placeholder="your@email.com"
                autocomplete="email"
            />
        </div>

        <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Password</label>
            <input 
                type="password" 
                id="password" 
                required
                minlength="6"
                class="w-full bg-charcoal border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                placeholder="At least 6 characters"
                autocomplete="new-password"
            />
        </div>

        <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Confirm Password</label>
            <input 
                type="password" 
                id="confirmPassword" 
                required
                minlength="6"
                class="w-full bg-charcoal border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                placeholder="Re-enter password"
                autocomplete="new-password"
            />
        </div>

        <button 
            type="submit" 
            id="registerBtn"
            class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:scale-105 transition-all flex items-center justify-center gap-2"
        >
            <span id="registerText">Create Account</span>
            <div id="registerSpinner" class="spinner hidden"></div>
        </button>
    </form>

    <div class="mt-6 text-center space-y-2">
        <p class="text-[10px] text-slate-600">Already have an account? <a href="/login" class="text-primary hover:underline">Login</a></p>
        <a href="/" class="inline-flex items-center gap-2 text-[10px] text-slate-500 hover:text-primary transition-colors mt-4">
            <span class="material-symbols-outlined text-sm">arrow_back</span>
            Back to Home
        </a>
    </div>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";

document.getElementById("registerForm").onsubmit = async (e) => {
    e.preventDefault();
    
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");
    const registerBtn = document.getElementById("registerBtn");
    const registerText = document.getElementById("registerText");
    const registerSpinner = document.getElementById("registerSpinner");
    
    errorMsg.classList.add("hidden");
    successMsg.classList.add("hidden");
    
    // Validate passwords match
    if (password !== confirmPassword) {
        errorMsg.textContent = "Passwords do not match";
        errorMsg.classList.remove("hidden");
        return;
    }
    
    registerBtn.disabled = true;
    registerText.classList.add("hidden");
    registerSpinner.classList.remove("hidden");
    
    try {
        const res = await fetch(`${API_BASE}/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ username, password, email })
        });
        
        if (!res.ok) {
            // Try to get error message from response
            let errorText = "Registration failed. Please try again.";
            try {
                const errorData = await res.json();
                errorText = errorData.detail || errorData.message || errorText;
            } catch (e) {
                errorText = `Server error: ${res.status} ${res.statusText}`;
            }
            errorMsg.textContent = errorText;
            errorMsg.classList.remove("hidden");
            return;
        }
        
        const data = await res.json();
        
        if (data.success) {
            successMsg.textContent = "Account created successfully! Redirecting...";
            successMsg.classList.remove("hidden");
            setTimeout(() => {
                window.location.href = "/app";
            }, 1000);
        } else {
            errorMsg.textContent = data.detail || "Registration failed";
            errorMsg.classList.remove("hidden");
        }
    } catch (error) {
        console.error("Registration error:", error);
        let errorText = "Connection error. Please try again.";
        if (error.message) {
            if (error.message.includes("Failed to fetch") || error.message.includes("NetworkError")) {
                errorText = "Cannot connect to server. Make sure the server is running on http://127.0.0.1:8000";
            } else {
                errorText = `Error: ${error.message}`;
            }
        }
        errorMsg.textContent = errorText;
        errorMsg.classList.remove("hidden");
    } finally {
        registerBtn.disabled = false;
        registerText.classList.remove("hidden");
        registerSpinner.classList.add("hidden");
    }
};
</script>
</body>
</html>
